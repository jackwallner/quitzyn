name: Sober
options:
  bundleIdPrefix: com.jackwallner
  deploymentTarget:
    iOS: "17.0"
    watchOS: "10.0"
  xcodeVersion: "16.0"
  minimumXcodeGenVersion: "2.38"

settings:
  base:
    SWIFT_VERSION: "6.0"
    DEVELOPMENT_TEAM: YXG4MP6W39
    CODE_SIGN_STYLE: Automatic
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "2"
    GENERATE_INFOPLIST_FILE: NO

packages:
  RevenueCat:
    url: https://github.com/RevenueCat/purchases-ios-spm.git
    from: 5.67.0

schemes:
  Sober:
    build:
      targets:
        Sober: all
        SoberWatch: all
        SoberWidgets: all
        SoberTests: [test]
    test:
      targets:
        - SoberTests
    run:
      config: Debug
  SoberWatch:
    build:
      targets:
        SoberWatch: all
    run:
      config: Debug

targets:
  Sober:
    type: application
    platform: iOS
    sources:
      - path: Sober
      - path: Shared
      # Sober.storekit is intentionally NOT bundled into the app: production uses
      # the live App Store / RevenueCat. It stays in the repo for local simulator
      # testing — attach it via the scheme's Run > Options > StoreKit Configuration.
      - path: Sober/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.quitzyn
        INFOPLIST_FILE: Sober/Info.plist
        CODE_SIGN_ENTITLEMENTS: Sober/Sober.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        TARGETED_DEVICE_FAMILY: "1"
    dependencies:
      - package: RevenueCat
        product: RevenueCat
      - target: SoberWatch
        embed: true
      - target: SoberWidgets
        embed: true

  SoberWatch:
    type: application
    platform: watchOS
    sources:
      - path: SoberWatch
      - path: Shared
        excludes:
          - "Services/SubscriptionService.swift"
          - "Services/SubscriptionPackageExtensions.swift"
      - path: SoberWatch/PrivacyInfo.xcprivacy
        buildPhase: resources
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.quitzyn.watch
        INFOPLIST_FILE: SoberWatch/Info.plist
        CODE_SIGN_ENTITLEMENTS: SoberWatch/SoberWatch.entitlements
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon

  SoberWidgets:
    type: app-extension
    platform: iOS
    sources:
      - path: SoberWidgets
      - path: SoberWidgets/PrivacyInfo.xcprivacy
        buildPhase: resources
      - path: Shared
        excludes:
          - "Services/SubscriptionService.swift"
          - "Services/SubscriptionPackageExtensions.swift"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.quitzyn.widgets
        INFOPLIST_FILE: SoberWidgets/Info.plist
        CODE_SIGN_ENTITLEMENTS: SoberWidgets/SoberWidgets.entitlements

  SoberTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SoberTests
      - path: Shared
    settings:
      base:
        GENERATE_INFOPLIST_FILE: YES
        PRODUCT_BUNDLE_IDENTIFIER: com.jackwallner.quitzyn.tests
    dependencies:
      - target: Sober
